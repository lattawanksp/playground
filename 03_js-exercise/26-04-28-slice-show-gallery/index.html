  <body>
    <div class="container">
      <div class="mySlides">
        <div class="numbertext">1/5</div>
        <img
          src="https://images5.alphacoders.com/332/332795.png"
          style="width: 100%"
          alt=""
        />
      </div>
      <div class="mySlides">
        <div class="numbertext">2/5</div>
        <img
          src="https://preview.redd.it/roronoa-zoro-one-piece-1920x1080-v0-8o1s4via4w061.jpg?width=1080&crop=smart&auto=webp&s=d60035d3cfb67af3e4ce8272eb8ecf73c3ddd643"
          style="width: 100%"
          alt=""
        />
      </div>
      <div class="mySlides">
        <div class="numbertext">3/5</div>

          src="https://images3.alphacoders.com/138/thumb-1920-1380225.png"

        <img
          src="https://wallpapercave.com/wp/wp13535911.jpg"
          style="width: 100%"
          alt=""
        />

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(+1)">&#10095;</a>

      <div class="caption-container">
        <p id="caption"></p>
      </div>

      <div class="row">
        <div class="column">
          <img
            class="demo cursor active"
            src="https://images5.alphacoders.com/332/332795.png"
            alt="LUFFY"
            style="width: 100%"
            onclick="currentSlides(1)"
          />
          <img
            class="demo cursor active"
            src="https://preview.redd.it/roronoa-zoro-one-piece-1920x1080-v0-8o1s4via4w061.jpg?width=1080&crop=smart&auto=webp&s=d60035d3cfb67af3e4ce8272eb8ecf73c3ddd643"

          />

            class="demo cursor active"
            src="https://images3.alphacoders.com/138/thumb-1920-1380225.png"
